name: CI

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Upgrade npm
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        if: ${{ !cancelled() }}
        run: npm run typecheck

      - name: Lint
        if: ${{ !cancelled() }}
        run: npm run lint

      - name: Format check
        if: ${{ !cancelled() }}
        run: npm run format:check

      - name: Test
        if: ${{ !cancelled() }}
        run: npm test

      - name: Build
        if: ${{ !cancelled() }}
        run: npm run build
